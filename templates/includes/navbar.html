
{% load static %}
<section class="header-main border-bottom">
    <div class="container">
        <div class="row align-items-center">
            <!-- 1. Logo -->
            <div class="col-lg-2 col-md-3 col-6">
                <a href="{% url 'home' %}" class="brand-wrap">
                    <img class="logo" src="{% static 'images/Logo.png' %}">
                </a>
            </div>

            <!-- 2. Category & Store (Dono ko ek hi col mein rakha hai) -->
            <div class="col-lg-3 col-md-4 col-12 d-flex align-items-center">
                <div class="category-wrap dropdown d-inline-block">
                    <button type="button"
                            class="btn btn-primary dropdown-toggle"
                            data-bs-toggle="dropdown">
                        <i class="fa fa-bars"></i> All category
                    </button>
                    <div class="dropdown-menu">
                        <li><a href="{% url 'store' %}">All Product</a></li>

                            {% for category in links %}

                               <a class="dropdown-item" href="{{ category.get_url }}">
                              {{ category.category_name }}
                            </a>
                        {% endfor %}
                    </div>
                </div>
                <!-- Store button ko yahan rakha hai ms-2 (margin start) ke saath -->
                <a href="{% url 'store' %}" class="btn btn-outline-primary ms-2">Store</a>
            </div>

            <!-- 3. Search Bar -->
            <div class="col-lg-4 col-md-5 col-12">
                <form action="#" class="search">
                    <div class="input-group w-100">
                        <input type="text" class="form-control" placeholder="Search">
                        <div class="input-group-append">
                            <button class="btn btn-primary" type="submit">
                                <i class="fa fa-search"></i>
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <!-- 4. User Widgets (Cart & Login) -->
            <div class="col-lg-3 col-md-12 col-12">
                <div class="widgets-wrap d-flex justify-content-end align-items-center">
                    <div class="widget-header">
                        <small class="title text-muted">Welcome guest!</small>
                        <div>
                            <a href="./signin.html">Sign in</a> | <a href="./register.html">Register</a>
                        </div>
                    </div>
                    <a href="./cart.html" class="widget-header ms-3 ps-3 border-left">
                        <div class="icon icon-sm rounded-circle border text-center">
                            <i class="fa fa-shopping-cart" style="line-height: 30px;"></i>
                        </div>
                        <span class="badge badge-pill badge-danger notify">0</span>
                    </a>
                </div>
            </div>

        </div> <!-- row.// -->
    </div> <!-- container.// -->
</section>
